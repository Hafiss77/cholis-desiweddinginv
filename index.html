<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="#8B6914" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Undangan Pernikahan Desi & Cholis</title>

  <link rel="icon" type="image/png" href="image/favicon.png" />
  <script src="https://kit.fontawesome.com/2828f7885a.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;900&family=Rouge+Script&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
    }

    /* ── Background foto couple ── */
    .cover {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      background: url('image/foto-couple.jpeg') center center / cover no-repeat;
    }

    /* overlay gradient gelap + champagne */
    .cover::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(30, 20, 5, 0.55) 0%,
        rgba(139, 105, 20, 0.45) 50%,
        rgba(30, 20, 5, 0.75) 100%
      );
    }

    .cover-content {
      position: relative;
      z-index: 2;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    /* ── Kepada ── */
    .kepada-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #C9A96E;
      margin-bottom: 6px;
    }

    .kepada-nama {
      font-size: 1rem;
      font-weight: 600;
      color: #F5ECD7;
      letter-spacing: 1px;
      margin-bottom: 2rem;
      min-height: 1.4rem;
    }

    /* ── Garis dekoratif ── */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.2rem;
    }
    .ornament-line {
      width: 50px; height: 1px;
      background: linear-gradient(to right, transparent, #C9A96E);
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, #C9A96E);
    }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: #C9A96E;
      transform: rotate(45deg);
    }

    /* ── Subtitle ── */
    .cover-subtitle {
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #C9A96E;
      margin-bottom: 0.5rem;
    }

    /* ── Nama ── */
    .cover-names {
      font-family: 'Rouge Script', cursive;
      font-size: clamp(3rem, 12vw, 4.5rem);
      color: #F5ECD7;
      line-height: 1.1;
      margin-bottom: 0.3rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .cover-ampersand {
      font-family: 'Rouge Script', cursive;
      font-size: clamp(2rem, 8vw, 3rem);
      color: #C9A96E;
      display: block;
      line-height: 1;
      margin: 0.1rem 0;
    }

    /* ── Tanggal ── */
    .cover-date {
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: #F5ECD7;
      opacity: 0.8;
      margin: 1.5rem 0 2.5rem;
      text-transform: uppercase;
    }

    /* ── Tombol Buka ── */
    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid #C9A96E;
      color: #F5ECD7;
      padding: 14px 36px;
      border-radius: 2px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-open::before {
      content: '';
      position: absolute; inset: 0;
      background: #8B6914;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      z-index: -1;
    }

    .btn-open:hover::before { transform: scaleX(1); }
    .btn-open:hover { border-color: #8B6914; }

    .btn-open i { color: #C9A96E; font-size: 0.9rem; }

    /* ── Animasi fade in ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cover-content > * {
      animation: fadeInUp 0.8s ease both;
    }
    .kepada-label    { animation-delay: 0.1s; }
    .kepada-nama     { animation-delay: 0.2s; }
    .ornament        { animation-delay: 0.3s; }
    .cover-subtitle  { animation-delay: 0.4s; }
    .cover-names     { animation-delay: 0.5s; }
    .cover-date      { animation-delay: 0.7s; }
    .btn-open        { animation-delay: 0.9s; }

    /* ── Tombol mute (muncul setelah masuk) ── */
    #btn-mute {
      display: none;
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 999;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(59, 43, 14, 0.85);
      border: 1px solid #C9A96E;
      color: #F5ECD7;
      font-size: 1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      backdrop-filter: blur(4px);
    }
    #btn-mute:hover { background: rgba(139, 105, 20, 0.9); }
    #btn-mute.visible { display: flex; }
  </style>
</head>

<body>

  <!-- Audio -->
  <audio id="wedding-audio" loop preload="none">
    <source src="audio/wedding-song.mp3" type="audio/mpeg">
  </audio>

  <!-- Cover Page -->
  <div class="cover">
    <div class="cover-content">

      <!-- Kepada -->
      <p class="kepada-label">Kepada Yth.</p>
      <p class="kepada-nama" id="nama-tamu">Bapak / Ibu / Saudara/i</p>

      <!-- Ornamen -->
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-diamond" style="opacity:0.5; transform:rotate(45deg) scale(0.6);"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>

      <!-- Undangan -->
      <p class="cover-subtitle">Undangan Pernikahan</p>

      <!-- Nama -->
      <div class="cover-names">
        Desi
        <span class="cover-ampersand">&</span>
        Cholis
      </div>

      <!-- Tanggal -->
      <p class="cover-date">Minggu &nbsp;·&nbsp; 7 Juni 2026 &nbsp;·&nbsp; Kediri</p>

      <!-- Tombol -->
      <a href="undangan.html" class="btn-open" id="btn-open">
        <i class="fas fa-envelope-open-text"></i>
        Buka Undangan
      </a>

    </div>
  </div>

  <!-- Tombol Mute -->
  <button id="btn-mute" title="Mute / Unmute">
    <i class="fas fa-music" id="mute-icon"></i>
  </button>

  <script>
    // ── Nama tamu dari URL param ──
    // Contoh: cover.html?tamu=Pak+Budi
    const params = new URLSearchParams(window.location.search);
    const tamu = params.get('tamu');
    if (tamu) {
      document.getElementById('nama-tamu').textContent = decodeURIComponent(tamu);
    }

    // ── Audio + navigasi ──
    const audio    = document.getElementById('wedding-audio');
    const btnOpen  = document.getElementById('btn-open');
    const btnMute  = document.getElementById('btn-mute');
    const muteIcon = document.getElementById('mute-icon');

    btnOpen.addEventListener('click', function (e) {
      // Putar musik saat tombol diklik (sebelum navigasi)
      audio.volume = 0.6;
      audio.play().catch(() => {}); // catch jika browser blokir

      // Simpan state musik ke sessionStorage biar lanjut di index.html
      sessionStorage.setItem('playMusic', 'true');
    });

    // ── Tombol Mute ──
    let muted = false;
    btnMute.addEventListener('click', function () {
      muted = !muted;
      audio.muted = muted;
      muteIcon.className = muted ? 'fas fa-volume-mute' : 'fas fa-music';
    });
  </script>

</body>
</html>
